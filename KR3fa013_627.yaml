body:
  text: 子出常陳而峽口君安樂明堂而輝潘即位相均先澗而有常則吉客星守犯幸臣謀后邦危靈臺明而雨降晦則情明三台整而和平火孛入而禍起風數言而不備可再三而詳推天市垣天市之精名號權衡星衆潤而年成歲美熒惑犯而誅滅賢臣君怒角而犯主客星義而兵臨市樓明而經商大利車四昏而國事大行壁失色而宗人有事族有房家人有明客守宗星是宗人而不美又量平直緣帛度而光明宰殺多屠坤而故潔國女掾候星而居常産座潤光法令平局人藥宦星大朗則囹官而有威列四明市稱寶而過室牛光彩則稱尺而無虧略索開而出㯎九星閉而人笣客星現而有赦中星淨而無悲七公齊政則法平而無酷九即天紀欱訟多而大明亡則紀綱損壞絶
  hash: sha256:b71567f08c01bc3604c0acdb1a565ccda134866df37f11ca4a2d84db5fa4c0d1
