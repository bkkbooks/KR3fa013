body:
  text: 子出常陳而峽口君安樂明堂而輝潘卽位相均先澗而有常則吉客星守犯幸臣謀后邦危灵臺明而雨降晦則情明三台整而和平火孛入而禍起風數言而不俻可再三而詳推天市垣天市之精名號權衡星眾潤而年成歳美熒惑犯而誅滅賢臣君怒角而犯主客星义而兵臨市樓明而經商大利車四昏而國事大行壁失色而宗人有事族有房家人有明客守宗星是宗人而不美又量平直緣帛度而光明宰殺多屠坤而故潔國女掾候星而居常產座潤光法令平局人藥宦星大朗則囹官而有威列四明市称宝而过室牛光彩則秤尺而无虧畧索開而出㯎九星閉而人笣客星現而有赦中星凈而无悲七公齊政則法平而无酷九即天紀欱訟多而大明亡則紀綱損壞絕
  hash: sha256:4520d2bfd0171e9a9a1fdb50edd962ceabad96ebab5fc4462acdb0655886cfd3
