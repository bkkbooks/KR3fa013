body:
  text: 嘗弄歡喜環金弓凶客凍死澆虛弓祭祀不聲在室后宮安泰到壁賢區稱情入鬼有道者進經婁姦令不行守胃大空囹圁在昴王者嚴刑犯畢灾生人簽來嘴獄訟憂兵逆行為鬼為賊晝見主弱臣強統鬼人死過半犯柳五穀繁綢甸張君臣和悅入翼布損人流統軫有喪有病凌辱將相當憂最代有惠君子憐恤窮獨安撫神明佑善兌修景福南方熒惑賦南方火精亦曰罰星亦帝之子主察視明入太微以受制聞有道之不經假如無道之國出入何常勾己為禍環繞為殃出則兵勤入則兵藏周旋止息為病為喪由人君之德慢易政臣之灾傷或進或退大小不常為水為旱飢儉須防每晨見面行疾万昏而漸昴出雯失度存在亡著依常道其色赤黃有怒有
