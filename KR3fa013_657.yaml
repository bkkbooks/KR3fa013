body:
  text: 河鼓三黃光將吉而亂塞互則將而有功曲則師而無利左其盛而他凶右其明而我吉失時涌刻差回浮鼓而昏律呂參差緣漸臺而所主羅堰三臺兩大明洪水泛濫識女三星欲明而天下灱心大至明王治世更無珍寶系綿怒角而布大貴絶跡而兵起多裂女宿女宿若箕四星黲希星明女官昌盛形暗而衄奚座危月暈星辰犯之則人灾物損鎮星熒惑女喪而男子灾殃日月食國憂而怒土孛守蠶損絲流歲星合其而立后熒惑合而女傷亡上分六國下列女邦若谷邦而有變向諸國而占楊離硃五點非其數以宮繁扶筐七星明蠶勝而昏死四星奚仲金火臨而兵殃九點天津動明而無行如水不整兮馬貴非常不備兮覆陷
  hash: sha256:9a58a25b5c70a4155e8c21ca8e4a1462402a314a4a34896bedc833527a9ea376
