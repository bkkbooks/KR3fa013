body:
  text: 谷鄉而歲宜天格不明並㮀大而無起天麻傾動遲帝王而不寧內廚星不尸常而有咎文星色切黃而生祥青黑細動指而陰金火守孛犯而兵殃陰陽和合而三公有輝金光星昏而大尊灾起天牢開而罪除星多閉而囚死太陽守昏而兵荒亂勢星明團宮而有榷掌百官於天象明夷免兵出動而玄戈大芒天理為貴人牢出明為貴人下獄此天象而癮占觀七星可見北斗天罡為太極之柮北斗為陰陽之要占璇璣而可測候七政以相推一為天柮為君為主二為天璇為后為妃三日天雕為灾為福四號天推為道為德五名王衡盛明而出姦除盜六為開陽光而歲稔歲豐七提光而占兵占盜齊七政而見災見危一秦二楚三梁四吳五趙六燕七齊谷失色而有損谷光彩而光
  hash: sha256:7cdfdfad8f57754503e8ce01ba030330a3d0352c1c4aaddfed17204eee5e2f5f
