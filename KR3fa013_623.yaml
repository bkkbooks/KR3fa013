body:
  text: 谷鄉而歲宜天格不明並㮀大而無起天麻傾動遲帝王而不寧內廚星不屍常而有咎文星色切黃而生祥青黑細動指而陰金火守孛犯而兵殃陰陽和合而三公有輝金光星昏而大尊灾起天牢開而罪除星多閉而囚死太陽守昏而兵荒亂勢星明團宮而有榷掌百官於天象明夷免兵出動而玄戈大芒天理爲貴人牢出明爲貴人下獄此天象而癮占观七星可見北斗天罡爲太極之柮北斗爲陰陽之要占璇璣而可測候七政以相推一爲天柮爲君爲主二爲天璇爲后爲妃三日天琱爲灾爲福四號天推爲道爲德五名王衡盛明而出姦除盜六爲開阳光而歳稔歳豊七提光而占兵占盜齊七政而見災見危一秦二楚三梁四吳五趙六燕七齊谷失色而有損谷光彩而光
  hash: sha256:af3ab200f03898ffb70f6812e85d64f273ddb6bef21359871638e73c1fc56a40
