body:
  text: 則地振山崩女床明而宮妃榮顯七公朗而天下和平功能虛虧在於良言可輕而望指東方歲星賦東方歲星名曰木精蒼帝之子大而光明所在分林土莫與之爭人君布惠不可加邢順則風雨協時而榖龍成專昌內益人富而其中國安守四夷來餘逆則君政殘暴失信虧仁盛則芒角而怒宇宙交爭拒諫信讒禍滿環贏下凌其上弟謀其兄赤黃則多風多早黑白則為水為共興金合大將有損被月掩而后妃危傾入太微君當布赦在東井而秦地安寧守翼鬼而國行鐵鎖選虛危而齊地災生守房産而五火豐稔田心宿而天下和平在角忠臣進策召劜諸副相城應氐內多有嘉犯亢豐太和平經箕中和口舌入斗壽祿盈乘牛而魚行人道犯女而
  hash: sha256:38076137e03a1ad55fb56e661742f7c4e81cb75a53be16cc61ee5b552fda6fcf
