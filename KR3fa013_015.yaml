body:
  text: 紫薇垣中宮北極紫微宮北極五星在其中大帝之坐第二珠第三之宮庶子居第一號曰為太子四為後宮五天樞左右四星是四輔天一太一當門路左樞右樞夾南門兩面營衛一十五上宰少尉兩相對少輔上輔次少輔上衛少衛次上丞後門東邊大贊府門東喚作一少丞以次却向門前數陰德門裡兩黃聚尚書以次其位五女史柱史谷一戶御女四星五天柱大理兩星陰德邊勾陳尾指北極顛
