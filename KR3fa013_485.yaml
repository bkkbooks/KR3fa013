body:
  text: 南方井宿八星橫列河中靜一星名鉞井邊安兩河谷三南北正天鐏三星井上頭鐏上橫列五諸侯侯上北河西積水欲覓積薪東畔是鉞下四星名水府水位東邊四星序四瀆橫列南河裹南河下頭是軍市軍市團圓十三星中有一箇野雞精孫子丈人市下列谷立兩星從東説闕邱兩星南河東丘下一狼光蓬茸左畔九箇弯弧弓一矢擬射頑狼星有箇老人南極中春秋出入壽爲窮
