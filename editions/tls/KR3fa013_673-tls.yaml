body:
  text: 鬼哭鬼星晦而流亡边庭驚急若天燈而明大光彩人飢兵奉候天狗而移徒西南朗金火也外廚天桂則安康天紀禽損金火遭殃抑宿抑星若抑一点重頭明大而權臣鎮回形直而天下謀主就聚兮國門兵閉失色兮天下不安三星為酒之旗五星守而大醉星宿星名七曜御女之宮搖变而賢人應死明大而國帝甼隆動則兵起离則主昏日食兮人多飢壘月暈兮便起兵殃木入安四星俱惡孛星犯乱变紀綱軒轅之神生風雨而入於土移使人流金火木守女主之憂歳谷豊天稷則朗刑罰內平則明天相之星百宦之德教正安邦星明可應
  hash: sha256:ef0d162a5326245bd5fcd8742db62d67276ebf23f3ec622674707db33da8c069
