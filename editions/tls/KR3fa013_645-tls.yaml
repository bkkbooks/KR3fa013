body:
  text: 五色權非恣吏启積善而有常發不成人道主平而无忒風琴四海綢王炫而降祥俗保萬方應中土而表正太陰賦水德凝陰臣道收斂分別遲疾之躰愛分逆順之刑弦半聖园見形客之屈展䁒居朔出知灾害之浮沉玉兔蛉䫫金波蟾蜍物春圆暈開庶士以灱王諸夜類畢知忠臣之輔主君德宜俻臣威莫貪房列三問之陰陽之境界月行九道分陟降之精由乍南乍北之見摽權而危倿或遲或疾屢聞失義以通吳成鬼成光成宮成厥如鏡如眉如花如虛初生正握軍外戰而主仁當晦由明回內具而兵發自失色而乱為赤無光臣若擅權瓜牙或出內屈而主畏驚眾強在弦而或國諸假分卽出從於地庶人主而無形墜於天忠臣而去軍合中分兩道失德之主危
