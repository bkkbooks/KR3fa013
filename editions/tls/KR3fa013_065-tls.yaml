body:
  text: 天市垣下元一宮名天市兩扇垣牆二十二當門六箇黑市樓門左兩星是車肆兩箇宗正四宗人宗星一雙亦依次帛度兩星屠肆前候星還在帝坐邊帝座壹星常光明四箇微茫宦者星以次兩星名列肆斗斛帝前依其次斗是五星斛是四垣北九箇貫索星索口橫者七公成天紀卻似七公形數着分明多兩星紀北三星名女狀此坐還依織女旁三元之象無相侵二十八宿隨其陰水火木土并與金
