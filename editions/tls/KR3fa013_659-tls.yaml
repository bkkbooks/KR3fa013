body:
  text: 天下發爪之星敗爪之曜客星入萸鹽大貴非其數地動山推明盛兮歳熟五谷昌吉昏暗兮后妃失勢离澇雴宿虛星兩形若連珠明則天寧地凈戰則上下泣悲日月食而兵起流行入而賊遂下九尺而天之中道上五星合之見文危罰歳妖灾觀司命而可見延年爵祿司爵祿以无虧矯狂散失占司危而有准祭㦛主過候司非以无凝哭星晦而國藥泣曜朗而主悲北夷兵起於天壘東秦將遶敗旧為宮奢則离瑜可明為視則灾祥可應危宿危星三點風雨先知如動而土功大作而哭泣火守而天之兵出而金飢辰星相流則下臣而叛上七曜逆守則遠泣而將危
  hash: sha256:38649d93e7f4988e0f1d7375f87389c51a4ff5153af14f3bf7159334ef4de626
