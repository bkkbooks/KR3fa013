body:
  text: 身後漫重輪仁賢太勾陳蜜沖直兵起南媚旦在其陽而大固宜甼伯主朝居其隅而小邦利次強臣月度太漸天人犬利宮合招搖太子沒而后憂輪應罰星大回傾而臣弊五車圣而面期期臨環而光勢達一德之太和則四時之長麗角星角宿雙懸南比而連為造化之萬物布人主之或賢明大号王道則泰芒移兮用事不寧曰蝕右王有危險同交左道斷將傾熒白相臨將戰廠而持正平星明言動搖芒而從撗天田兩矅金兵火旱水加漲澇進賢一星明而賢在朝暗面居野三星同昴移徒則運作不寧天門明而灱化暗而兵具庫樓芒動兵起四方不見則國中无主下以謀上南門星明主遠方而進貢睹則客守冬乱夷秋來侵
  hash: sha256:b91ffe862ae1651d99fe18248cc2113177c3dd99910388ea87462d32c60d954d
