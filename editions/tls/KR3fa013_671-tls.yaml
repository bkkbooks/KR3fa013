body:
  text: 井宿八点橫列河中麻三公而失色加祿位而大明銊輝而天子用銊月並而風雨霖日月並五星而犯子送父臣主交爭中官兵起南北河而動搖天道不通綠兩河而不俱歳福歳祿祭諸腋而有準軍凶年耗視天鐏以無差積新祭於人主積水考於水灾水位水內國沒兮移近北和四漬四星水洪兮其光如電客星金火相凌兮軍士飢荒搖動崗居諸侯兮將兵並起丈人孙子見明主壽延年天關天兴金火把則卒交將戰狼星金火守及搖動胡狄而無弧矢光明及非常臣賊而起春分秋分見老人於南刻入惡出昌候其祥於今古鬼宿鬼形四方广氣之傷明依常而歳美拙明大而兵荒積尸動而
  hash: sha256:bbcb9dd188607e17ad5cd14d608b6299176fe5bc731c25716d0b629ce2adad59
