body:
  text: 北方女宿四星如箕主嫁娶十二諸國在下陳先從越國向東論東西兩周次二秦雍州南下雙雁門代國向西一晉伸韓魏谷一晉北輪楚之一國魏西屯楚城南畔獨燕軍燕西一郡是齊臨齊北兩邑平原君欲知鄭在越下存十六黃星細區分五箇離珠女上生敗瓜珠上誇瓜生兩箇谷五誇瓜明天津九箇彈弓形兩星入牛河中橫四箇奚仲天津上七箇仲側扶筐星
