body:
  text: 河鼓三黃光將吉而乱塞互則將而有功曲則師而無利左其盛而他凶右其明而我吉失時涌刻差回浮鼓而昏律呂參差緣漸臺而所主羅堰三臺兩大明洪水氾濫識女三星欲明而天下灱心大至明王治世更無珎宝系綿怒角而布大貴絕跡而兵起多裂女宿女宿若箕四星黲希星明女官昌盛形暗而衂奚座危月暈星辰犯之則人灾物損鎮星熒惑女喪而男子灾殃日月食國憂而怒土孛守蚕損絲流歳星合其而立后熒惑合而女傷亡上分六國下列女邦若谷邦而有变向諸國而占楊离硃五点非其數以宮繁扶筐七星明蚕勝而昏死四星奚仲金火臨而兵殃九点天津動明而無行如水不整兮馬貴非常不俻兮覆陷
  hash: sha256:4854c618a21dfdb38ac67f39393eb51cff6ee55a0f3cc54b23c124cbfe0025a1
