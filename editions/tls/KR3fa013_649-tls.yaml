body:
  text: 亢宿亢星兩兩形若弯弯弓明四海以岡王臣忠而无疾移徒則病症傷人不見則昇沸澇旱交角赤而兵散失色王者流亡太白守之兵起日月食以兇顧拼威七黑金守之夷狄侵境攝提三客入之人主災殃考囚察情於顧頓狄兵边紀孛客出於陽門氐宿氐形着口四冊方明大而君正臣忠耽動而將臣內乱日月食主內殘差木立妃大臣簪上金臨拜將水合官憂月暈則主不安彗孛則暴兵起降耳露則占天乳胡兵顧佼梗河喪亡則招提而变色臣失位帝度不明亢池車騎非常而必主災殃騎官陳車持捋失時而起禍房宿
