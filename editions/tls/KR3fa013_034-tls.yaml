body:
  text: 太微垣上元天庭太微宮昭昭列象在蒼穹端門只是門之中左右執法門西東門首皂衣一謁者以次即是烏三公三黑九卿公皆旁五黑諸侯卿後行四箇門西主軒屏五帝內座於中正幸臣太子並從宮烏列帝后從東定郎將虎賁居左右常陳郎位居其後常陳七星不相誤郎位陳東一十五兩面宮垣十星布左右執法是其數宮外明堂布政宮三箇靈台候雲雨少微四星西南隅長垣雙雙微西居
