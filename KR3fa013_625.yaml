body:
  text: 奉七政明而國樂多星附而无危甫盛斗而主福罡星凈而人虧一星不暨天子不尊於鬼神二星变色人君妄鑒於山陵人氏困苦乃三星无光法令不平則四星而五彩涩聲癈正是星而失色農失諸賢則六星而傾成不安夷夏定七星而昏沉五曜客星乃彗索而犯禍起俻舉徽言以爲鑒證太微垣太微七政后妃之宮刑罰乃執法移動國主不實謁者不明陰陽災理金火守三公被戮輔君治事如儮動九鄉誅邢臣有礼屏星而大君行正諸刑則輝帝座中黃而主福不明人主可求賢四星俱備明以中央天下灱心金大水入太微而君昏被戮幸臣細小而臣吉從官不見而王憂太子星明盛而賢則金火守應廉而灾迍將怒緣芒角有動軍行是完負金火而搖明天
  hash: sha256:d0698a69811111d2a3a101d0fbd4d14cdca5f5ed1b63ed2ec127ee21c9507a87
