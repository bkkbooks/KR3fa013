body:
  text: 奉七政明而國樂多星附而無危甫盛斗而主福罡星淨而人虧一星不暨天子不尊於鬼神二星變色人君妄鑒於山陵人氏困苦乃三星無光法令不平則四星而五彩澀聲廢正是星而失色農失諸賢則六星而傾成不安夷夏定七星而昏沉五曜客星乃彗索而犯禍起備舉徽言以為鑒證太微垣太微七政后妃之宮刑罰乃執法移動國主不實謁者不明陰陽災理金火守三公被戮輔君治事如儮動九鄉誅邢臣有禮屏星而大君行正諸刑則輝帝座中黃而主福不明人主可求賢四星俱備明以中央天下灱心金大水入太微而君昏被戮幸臣細小而臣吉從官不見而王憂太子星明盛而賢則金火守應廉而灾迍將怒緣芒角有動軍行是完負金火而搖明天
  hash: sha256:5cb8d97f3cee995565f4b75e980e8efb0afeb3d7e2a7c8796e1eefb968a58d5d
