body:
  text: 采隨登於細抑生靈抑化迎上于扶桑鑒物無私行天有律冠象必喜岙旅而位有賴姛正履言安貴帶而門非舊日著乃萬邦和順四氯平直色白而軍定數師昏赤而君憂疾疫烏形失色參黃而上畏灾生脊直臣獨依方面而嚴誠纓提后削逐之于以開名紐見人市戰鋒辦兵起外虹異日客軍之籌騣皆強而內蒸出主將君之喜掩狀如撩吏為軒惑霄後之光輝謂啓臣之正理暈軍同國勝負難分兩半黃色右遠候之順國中間黑氣防近將以謀君連壁重光主道德之成象二彗四出赦福善以重祥暈氣中黃朝綱表正不時霜降喜逢艷併及左右兩耳為祥兮萬國灱風上下二藀作弥兮一人虧令春生吳舍刑出秦家春分秋分望太平之有序南至比至為寒暑之差一倿在傍致象相而有昧群臣甫正獲慶賀以煢精文備在中聖合
