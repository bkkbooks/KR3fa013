body:
  text: 身後漫重輪仁賢太勾陳蜜沖直兵起南媚旦在其陽而大固宜甼伯主朝居其隅而小邦利次強臣月度太漸天人犬利宮合招搖太子沒而后憂輪應罰星大回傾而臣弊五車聖而面期期臨環而光勢達一德之太和則四時之長麗角星角宿雙懸南比而連為造化之萬物布人主之或賢明大號王道則泰芒移兮用事不寧曰蝕右王有危險同交左道斷將傾熒白相臨將戰廠而持正平星明言動搖芒而從撗天田兩矅金兵火旱水加漲潦進賢一星明而賢在朝暗面居野三星同昴移徒則運作不寧天門明而灱化暗而兵具庫樓芒動兵起四方不見則國中無主下以謀上南門星明主遠方而進貢睹則客守冬亂夷秋來侵
  hash: sha256:13ec57a0639df7dc753b3e6d9eb7d9b082b5f677ff3ce93ab70714d40607f769
