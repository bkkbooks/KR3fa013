body:
  text: 五色權非恣吏啓積善而有常發不成人道主平而無忒風琴四海綢王炫而降祥俗保萬方應中土而表正太陰賦水德凝陰臣道收斂分別遲疾之躰愛分逆順之刑弦半聖園見形客之屈展䁒居朔出知災害之浮沉玉兔蛉髏金波蟾蜍物春圓暈開庶士以灱王諸夜類畢知忠臣之輔主君德宜備臣威莫貪房列三問之陰陽之境界月行九道分陟降之精由乍南乍北之見摽權而危倿或遲或疾屢聞失義以通吳成鬼成光成宮成厥如鏡如眉如花如虛初生正握軍外戰而主仁當晦由明回內具而兵發自失色而亂為赤無光臣若擅權瓜牙或出內屈而主畏驚衆強在弦而或國諸假分即出從於地庶人主而無形墜於天忠臣而去軍合中分兩道失德之主危
  hash: sha256:d6932e7d7cef2ec6ab4beacabb56a13b01f3a5167d30fed09ad9b2d9032d158c
