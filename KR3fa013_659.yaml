body:
  text: 天下發爪之星敗爪之曜客星入萸鹽大貴非其數地動山推明盛兮歲熟五谷昌吉昏暗兮后妃失勢離潦雴宿虛星兩形若連珠明則天寧地淨戰則上下泣悲日月食而兵起流行入而賊遂下九尺而天之中道上五星合之見文危罰歲妖災觀司命而可見延年爵祿司爵祿以無虧矯狂散失占司危而有準祭㦛主過候司非以無凝哭星晦而國藥泣曜朗而主悲北夷兵起於天壘東秦將繞敗舊為宮奢則離瑜可明為視則災祥可應危宿危星三點風雨先知如動而土功大作而哭泣火守而天之兵出而金飢辰星相流則下臣而叛上七曜逆守則遠泣而將危
  hash: sha256:7eb550f8fa8b54cfe8e866c0b6bbbe2a44cd75bd559b25d5815cc2485d4b009a
