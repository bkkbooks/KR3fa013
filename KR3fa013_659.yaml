body:
  text: 天下發爪之星敗爪之曜客星入萸鹽大貴非其數地動山推明盛兮歲熟五谷昌吉昏暗兮后妃失勢離潦雴宿虛星兩形若連珠明則天寧地淨戰則上下泣悲日月食而兵起流行入而賊遂下九尺而天之中道上五星合之見文危罰歲妖灾觀司命而可見延年爵祿司爵祿以無虧矯狂散失占司危而有准祭㦛主過候司非以無凝哭星晦而國藥泣曜朗而主悲北夷兵起於天壘東秦將繞敗舊為宮奢則離瑜可明為視則灾祥可應危宿危星三點風雨先知如動而土功大作而哭泣火守而天之兵出而金飢辰星相流則下臣而叛上七曜逆守則遠泣而將危
  hash: sha256:939c7c20fbfae0f124d0b4321d55fa508d03ed5bf5f35f33dd2363b650e5d1ae
