body:
  text: 張宿張星六點明堂之官失色宗廟而損明大國勝而強動搖而賞貴天下離徒則臣逆於君金火守而禍亂並起細小暗而少子少孫日食而禮虧應損同交而人道俞行火掌豑荒兵大出水亡犯國主不寧天廟之星火守而兵灾並起長垣之宿金卿及火胡冠兵荒少微星色黃明而吳士本五星月犯入加而女生憂天尊之星不見而愁翼宿翼胃道二十二星失色明流回禁芒動而化道不行動移則三公受戮明大則四夷來賓離移兮天子兮動昏暗兮正教畢張日食兮臣簪於上日交兮父愛憂偟五星孛㽖灾殄客星來犯東既五點金火守東南兩銊而兵起星芒移動及相凌上下則
  hash: sha256:2eab83c453529fa687af184ee12ee590e4eaffe9a25eabb447c593e38d3448eb
