body:
  text: 肅清抵鍵人主下殿入鬼宗廟改更掩銊大臣諸戮犯執法將相憂蒸几厥在拉知針知徽西方太白賦西方金星少陰之精白帝之子亦長庚所主者義大而光明將軍之相諸罰為名怒賊毛孛叱咤喜則斂角臧刑遇大大灾子次和木遠近加病犯角天下大戰入亢水旱並生守氐將軍守害居心蟲犬縱撌入房干戊竟起犯尾天下交爭守箕夙早有赦繞斗臣執權衡環午比蒸發泄抵女府庫不盈虛宗廟失祀環危齊地灾生秉張胡兵大起犯室武將休兵入奎川源泛濫守壁國用嚴刑乘婁有兵有赦入胃飢䬴相仍犯昴胡將擾境守畢捋相奸生乘參必嘴憂疑易政應并鬼臣將多驚入椥元封爵召星張戰死連營勾翼軫諸微大振師旅入軒轅金運旅
