body:
  text: 昴宿昴形一聚七粒分明壯小而侫臣被戮搖動而君杀忠臣明大而臣忠君正星齊而大水崩洪色黃而是兵大出跳曜而胡寇兵甼祭山林妖变於月阿之禁言涌泄於天陰牛馬盈而天苑朗貨財散而蘭榮昏六星卷舌潤凈而賢人用事星繁非數死人而積立山説星昏暗師誣退而醫虧萬石光金火容而軍動畢宿畢星瓜义八星附之边大星曰边将光蕭而夷黃來臻失色而边兵數起星亡而兵喪將傾動搖而飾城寇起就聚而法令酷昏天街金火犯胡兵而舉附耳細微小外回而侵諸侯奉上或朗或光宗合將傾或亡或暗陰陽否官失守而天晦金來淨水火戰五車昏中三桂星而俱則倉稟充實出何方而变其回而
  hash: sha256:d7150e391f844bdb04b56e1a537cb6c61dd5091b7cbdf56b6b5927f57db1e8cb
