body:
  text: 婁禽三宿直法之臣動搖則聚衆於野金火則宮內召冬日月食而宮亂四星犯而城危水星守而大水同暈臨而兩退仁智向左吏而察禮義向右吏而推歲豐登是天倉明正年栗盈滿得天庚而有輝將軍土中為主占是搖則出其城不俱則凶兵大起胃宿胃星三點周昴之形明則四時和美倉賓實而充盈上頭下失緣不明而生災殄人流谷貴則細小而無昏五星日月孛曜加臨而憂甚稟星主谷黎稷熱而以光明金火犯囚而災損黃則谷登衆星生於天陵死喪非數天船回是若明盛而最吉彗客並動若時而必主兵荒死人入沙是積尸而明朗洪波如海乃積水而光榮
  hash: sha256:f24fb79839e756db694a4efe7f6362fb87a722576fc066e29761bf21257826bd
