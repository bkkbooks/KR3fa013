body:
  text: 北方室宿兩星上有離宮出繞室三雙有六星下頭六箇雷電形壘壁陳次十二星十二兩頭大似井陳下分布羽林軍四十五卒三為群軍西四星多難論子細歷歷看區分三粒黃金名鐵鉞一顆真珠北落門門東八魁九箇子門西一宿天網是電旁兩黑圖公吏騰蛇室上二十二
