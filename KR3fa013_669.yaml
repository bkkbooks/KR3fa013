body:
  text: 可占龍落地虎害人而咸池朗五星園日月犯貴者而多亡參旗稀明而寇伏九遨金火而兵殃天園曲而葉熟交其候而死成觜宿聚小三聚參中禾登谷熱而明大君臣失位而動移日食多臣逆於上同交兮君害於臣五星犯而灾至孛客守而兵行上尊下敬坐旗而明禽死虫殃司侢而暗參宿參方總七亦名大臣發輝而臣忠子孝動移而支害忠臣伐星宜黲同明而臣逼於主參赤如硃我敗他君必盈玉井入足兵起出則虎戰傷人金火守固易改而兵奉日月食五谷荒而无成軍渴軍开而必晦人畜死外屏而客當天屎若黃必吉天廚如土具隆
