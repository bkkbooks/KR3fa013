body:
  text: 房為明臺四直而光茴兩星為陽道北二宿為陰衢七矅往中天下和平而頻遊陽喪早行陰而水蓮兵明則國泰大則兵與離則人流食則昏亂樊孛犯則兵與五星犯而有之鈎鈐明盛近房而和同諧意遠散而皆為絶嗣罰三星而直法有平科令不中日遇金火國內有憂從官一例以詳鍵明內亂之處心宿心育三星色深而明中一星曰帝主不二星曰嗣君右一星曰簽字優明則四野來臻直則地動而失勢晦則不隱而流亡金火把血光不止土木犯吉則非常日月而兵起熒惑守而國亡客星孛犯天下兵荒積卒不宜其犬惟宜細小而良動搖兵戈大出星絶兵起四方他星犯而臣誅我星犯而主昌尾宿
  hash: sha256:6f5e83246d4c8250a5904d4243c0d7e7cf0c96e6dcb17356baabf923453fcc18
