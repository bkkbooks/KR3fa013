body:
  text: 中央鎮畢賦畢有頸産中央土精皇帝之子后土別名所在之回不可交兵其分無灾五榖熟成人民樂葉由召之貞均若內無仁德外向爺飾其憂失度為妖為願上亂下單葉叛西逆上天降灾為雹為霹山崩地拆衰衰哭聲與木相紀后妃的傾裝水相合軍破連營抵角后宮有喜入亢萬事無成犯房有臣協主應氐儲副歡榮守心聖圭出將在尾賊盜公行遠其水灾人散入斗登位無爭環牛賊臣謀主犯女布貴縱撗采虛赤地千里入危攻後灾生犯室簧修宮殿遠壁道術彰明采奎物貴水湧守委奸詐臣生犯胃水灾米貴勾日西將士出征觸畢王侯將變采嘴國破人驚環參大臣出使入井水旱休耕在鬼近臣謀主犯抑天下和平召星萬方皆治張五榖不成入軫粟貴無起守翼懷中
  hash: sha256:a4487721d40eaab12d03085062327d56f1dc5cb2b6315942310bb1486a66c02d
