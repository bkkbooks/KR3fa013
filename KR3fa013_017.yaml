body:
  text: 勾陳六星六甲前天皇獨在勾陳裹五帝內產後門是華蓋并杠十六星杠作柄象華蓋形蓋上連連九箇星名曰傳舍如連丁垣外左右谷六珠右是內階左天廚階前八星名八穀廚下五箇天棓宿天床六星左樞在內廚兩星右樞對文昌斗上半月形稀踈分明六箇星文昌之下曰三師太尊只想三公明天牢六星太尊邊太陽之守四勢前一箇宰相太陽側更有三公向西偏即是玄戈一星圓天理四星斗裹暗輔星近着問陽淡
