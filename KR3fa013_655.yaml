body:
  text: 之五谷豊登來賤如泥斗宿斗灼六矅关機之灵盛明而壽命握久变動而憂鬱哭生若明兮君臣同享若麥兮天子憂喚七曜逆人民困苦孛星逐兵起盼鱉星七客守之水氾之灾達曜三動搖而入勞龍現五星同食而犯臣謀其主開道不通天弃彗犯而入米貴以兵金火守雞是候庚軍而發簽八星暗山而明言狗二星居吉而離凶狗國明而边寇作太白犯而紀綱金火行外夷有麥客星入盜賊侵傷水澇火旱是天淵而主之農穡甼衰丈人而商定牛宿牛耕六地開梁之神水火犯而良吉金火守而軍甼月暈星昏數不登牙損天田損天曜金兵澇火星次星九黑明灾而特昌
  hash: sha256:80ce49414ab2d5cda2fd39df8148f80b5476e6e97ebf949d36b4e0eae533de3c
