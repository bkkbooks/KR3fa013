body:
  text: 尾鈎九子位列南方數明而嬪妃无妬細微而后主憂惶踈遠兮離宮失勢動權兮君臣兩行就聚号大水而起木犯兮后妃无疑火守兮宮中有犯水守兮內有其非三星把而最吉客星守而臣誅日月食飢荒变地金火守后宫共隨千里紅紗是龜是而絕踈君臣廣會是居常而有輝火守之兵甼壘壘土守之將罷威威天將宜聵不若其明入熒惑而换主落河車而絕君知子嗣湏占傳説茶雲雨必貴金星箕宿箕若箕形日月下臨箕畢翼軫風雨主口舌蛮夷胡兵直明大而五谷豊熟曲聵昏而世乱將傾就聚兮天下憂惠搖動兮蛮夷來侵移徒兮人流國散入河兮父子相吞月暈金火犯兮兵起流星相人臣叛於君杵臼劇皮暗則人民相食盛則人安忻
  hash: sha256:d10a57697153baa7d61cac0e960e50fcdeda9aa4a5962eca28bed8fd5b5db1df
