body:
  text: 北方牛宿六星近在河岸頭頭上雖然有兩角腹下從來缺一腳牛下九黑是天田田下三三九坎連牛上直建三河鼓鼓上三星號織女左旗右旗谷九星河鼓西畔右邊明更有四黃名天桴河鼓之下如連珠羅堰三烏牛東居漸臺四星如口形輦道東足連五丁輦道漸台在何許欲得見時近織女
