body:
  text: 懸旌守天田入主守爵祿當午地戎霹崢嶸盡見之國亡兵破不見而殺將屠城或者山崩四面賊臣上殿君弱臣強兵鋒轉戰互執台衡妖祥屢見臣即既虧辰心亦變嗚呼有士君子股肱之臣不簪不濫敬天畏神道以理國德以修身福流後嗣化及人也民北方辰星賦北方星辰乃水之精黑帝之子偏將為名所主者聽察君之情所在之國憂怖不寧君若審其法度明其號令遠其説邪親其中正憂縱無欲家邦之度均希不理城開不任賢臣取舍呢小人上天重戎災其及臨五谷不熱風雨不均陰陽錯亂飢荒荐臻與火合干戈為亂枝土犯戎虛兵甼觀其芒角知小人之哉祥蕃其伏見祭君臣之政聲暴水漲而青色大喪至而虛白潤
