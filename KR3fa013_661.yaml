body:
  text: 人星五黑不見則詔出柯詐臼星四點覆飢荒而仰豐三星名持不入臼而平亂荒七星兵車動搖而兵紛壘壘服飾正而天鈎則朗焉大貴而造義則亡瑣墓星明而多死葬虛梁金火犯而兵臨天錢十星明而庫實金火兵道而起蓋屋二曜為宦會金火以同途室宿室宿雙天子之殤若暗兮鬼神不享若曜兮社稷安康太白熒是守離宮兵起蟄藏出早是雷電而所驚壁陳十二太平而則利光解希動亡從金火水而兵起客星入錻大臣當誅兵甼而微於北落世亂而動於羽林八魁入客連金火而盜起公吏上工動搖而修藥城池騰蛇微吉建南鄉而大早客守明凶接性比而水災若天綱金火守而兵與著平善明朗而安康
  hash: sha256:00c81c157322a2f47213b20794e9d7e4440a8800ebb0750238ae1c54cc39c510
