body:
  text: 黃色而妝成其頻也蠢晨見而秋夕伏其逆也冬濫而夏涼食太陰而女謀近太陽而掩眏守角水旱並恩召元米谷責湧在心天下平和守房姦臣謀動居尾江漢流橫入箕大臣多恐花雴危丁壯晝行秉丰牛而川決壅凌女布帛湧責守尾君臣繼踵入奎臣下被執守胃兵起人愁繞畢邊方驚急在昴執政邢侃勾觜兵長為弊入井兵誰未休秉參水災溢起繞鬼疫癘當憂召星貴臣得罪入抑水損田疇守翼人民飢餷在軫米谷雞汗逼太微而群臣相殺犯執法而兵火為言獄軒轅后宮不藥秉與鬼秦地災流入壁而朝焚欲憂犯氐而獄訟稽召枉張貴臣守國犯室后葉被漢守婁水敗萬物行速相簪難休太陽賦矅靈天道法象君王微肆靈而失色枯一得而國光小霍慕思
