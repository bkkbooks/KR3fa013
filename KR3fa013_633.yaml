body:
  text: 悖或角或芒入太微文窄殂落把紫薇椘有死亡守天莫江河泛濫在胃宿天下空倉逸羽林禁兵犬起田張宿天下飢荒入南斗君災及輔犯東井水火為殃守少微處士被尼遠天困萬姓飢荒采與鬼兵喪並起入昴宿胡虛簪藏尸心宿王者大意受軒轅后妃驚惶犯室宿米黃比地采危星兵起南邦在尾大臣不順入角大得多傷勾亢溧淺城邑犯鬼死者相望南奎火不見子犯天駟臣叛於五凌虛萬物不稔守壁邊有兵降入畢賢士彼戮召參兵連四方抵女布帛愑黃守牛六畜死傷勾柳不尊王命犯角禍起蕭墻入軫人民徒後犯婁召必出疆逆行於氐環繞於房服肱失位父子分張經天津江海畢沸笛箕宿入食糟粳犯翼宿樂瘠立龍有士君子於可不藏克己復扎其後必昌
