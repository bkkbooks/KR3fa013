body:
  text: 三垣七政二十八宿周天精鑑紫薇垣紫微北辰衆星之君為帝宮而立子為尊殿而降星初一星為太子第二星曰帝君次三星曰庶子次四星曰後宮次五星為天樞天紐如變色為禍為逆四輔尚書芒大而臣逼於主天理之辰開戰而開喜聞敬天一太乙明盛陰陽和合而主吉左輔右弼直辰出開散兵行而有餘陰陽二德不明而國政亨嘉女桂兩使明昌而宮人欣喜內寵用事因禦女而知明脢朔不齊則天柱而育菱邢寰不明則大理而昏暗元辰失國祝勾陳而無光天皇為萬神之尊隱隱而充之則言六甲為四時之主明明而寒暑調均五帝座客星犯而臣叛畢蓋扛欲亡人主而不寧客躍犯傳舍而胡起捉傾動內偕而宊凶天廚見則年美八
  hash: sha256:d75c403665c256a09799d85882a4edbf38a4017f0b7f574e84680b9a6da3df13
