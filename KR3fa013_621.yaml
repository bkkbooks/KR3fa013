body:
  text: 三垣七政二十八宿週天精鑑紫薇垣紫微北辰眾星之君爲帝宮而立子爲尊殿而降星初一星爲太子第二星曰帝君次三星曰庶子次四星曰後宮次五星爲天樞天紐如變色爲禍爲逆四輔尚書芒大而臣逼於主天理之辰開戰而開喜聞敬天一太乙明盛陰陽和合而主吉左輔右弼直辰出開散兵行而有餘陰陽二德不明而國政亨嘉女桂兩使明昌而宮人忻喜內寵用事因禦女而知明脢朔不齊則天柱而育菱邢寰不明則大理而昏暗元辰失國祝勾陳而無光天皇爲萬神之尊隱隱而充之則言六甲爲四時之主明明而寒暑調均五帝座客星犯而臣叛畢葢扛欲亡人主而不寧客躍犯傳舍而胡起捉傾動內偕而宊兇天廚見則年美八
  hash: sha256:64e578af2079a2db2432b28e0934649c4483723f410f6b7e6671a12df31216b1
